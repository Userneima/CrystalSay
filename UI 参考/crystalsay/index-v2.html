<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CrystalSay — 表达晶体 · 语料空间</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --bg-deep: #080c18;
  --bg-cave: #0d1328;
  --bg-surface: #131b33;
  --bg-elevated: #1a2444;
  --text-primary: #e8e6f0;
  --text-secondary: #9895b4;
  --text-tertiary: #6b6885;
  --border-subtle: rgba(255,255,255,0.06);
  --border-glow: rgba(255,255,255,0.12);

  /* Crystal topic colors — jewel tone palette */
  --color-study: #5b9cf5;
  --color-study-glow: rgba(91,156,245,0.45);
  --color-career: #e2b04a;
  --color-career-glow: rgba(226,176,74,0.45);
  --color-social: #f0729e;
  --color-social-glow: rgba(240,114,158,0.45);
  --color-opinion: #a878e8;
  --color-opinion-glow: rgba(168,120,232,0.45);
  --color-life: #4ecb71;
  --color-life-glow: rgba(78,203,113,0.45);
  --color-emotion: #f08c5c;
  --color-emotion-glow: rgba(240,140,92,0.45);
  --color-travel: #4ec9c4;
  --color-travel-glow: rgba(78,201,196,0.45);
  --color-interview: #b8c0d8;
  --color-interview-glow: rgba(184,192,216,0.45);

  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 28px;

  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Ambient Background ===== */
.bg-ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(30,40,80,0.5) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 20% 70%, rgba(20,60,70,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 50%, rgba(60,20,60,0.2) 0%, transparent 70%);
}
.bg-ambient::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1.5px 1.5px at 55% 45%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1.5px 1.5px at 15% 70%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1.5px 1.5px at 50% 60%, rgba(255,255,255,0.15), transparent);
  animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.7; }
}

/* ===== Floating Particles ===== */
.particles-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  animation: float-up linear infinite;
}
.particle:nth-child(odd) { background: rgba(180,200,255,0.12); }
@keyframes float-up {
  0% { transform: translateY(105vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.8; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* ===== App Shell ===== */
.app-shell {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 20px 16px 120px;
  min-height: 100vh;
}

/* ===== Header ===== */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 20px;
}
.header-brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #a878e8, #5b9cf5);
  clip-path: polygon(50% 0%, 90% 25%, 90% 75%, 50% 100%, 10% 75%, 10% 25%);
  box-shadow: 0 0 20px rgba(168,120,232,0.35), 0 0 40px rgba(91,156,245,0.2);
  animation: brand-pulse 3s ease-in-out infinite;
}
@keyframes brand-pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(168,120,232,0.35), 0 0 40px rgba(91,156,245,0.2); }
  50% { box-shadow: 0 0 30px rgba(168,120,232,0.55), 0 0 60px rgba(91,156,245,0.35); }
}
.brand-text h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem; font-weight: 600; letter-spacing: 0.02em;
  color: var(--text-primary); line-height: 1.1;
}
.brand-text span {
  font-size: 0.7rem; color: var(--text-tertiary); letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header-stats {
  display: flex; gap: 16px;
}
.stat-item {
  text-align: center;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; font-weight: 600; color: var(--text-primary);
}
.stat-label {
  font-size: 0.65rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;
}

/* ===== Input Section ===== */
.input-section {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 20px;
  position: relative;
  backdrop-filter: blur(12px);
}
.input-section::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(168,120,232,0.15), rgba(91,156,245,0.1), rgba(78,203,113,0.08));
  z-index: -1;
}
.input-label {
  font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.input-label .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ecb71; }
.video-input-wrap {
  display: flex; gap: 8px;
}
.video-input-wrap textarea {
  flex: 1;
  background: var(--bg-deep);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 12px 14px;
  font-size: 0.85rem;
  font-family: inherit;
  resize: none;
  min-height: 56px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.3s;
}
.video-input-wrap textarea:focus {
  border-color: rgba(168,120,232,0.5);
  box-shadow: 0 0 20px rgba(168,120,232,0.1);
}
.video-input-wrap textarea::placeholder {
  color: var(--text-tertiary);
}
.btn-refine {
  flex-shrink: 0;
  width: 56px;
  background: linear-gradient(135deg, #a878e8, #7c5ce7);
  border: none; border-radius: var(--radius-md);
  color: #fff; font-size: 0.75rem; font-weight: 600;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  transition: all 0.3s var(--ease-out-expo);
  position: relative; overflow: hidden;
}
.btn-refine:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(168,120,232,0.4);
}
.btn-refine:active { transform: scale(0.96); }
.btn-refine .refine-icon {
  font-size: 1.3rem; line-height: 1;
}
.btn-refine::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.quick-paste {
  display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.quick-paste-btn {
  font-size: 0.68rem; color: var(--text-tertiary);
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  border-radius: 20px; padding: 5px 12px; cursor: pointer;
  transition: all 0.2s;
}
.quick-paste-btn:hover {
  color: var(--text-primary); border-color: var(--border-glow);
  background: var(--bg-surface);
}

/* ===== Cauldron Overlay ===== */
.cauldron-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(8,12,24,0.92);
  backdrop-filter: blur(16px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s var(--ease-out-expo);
}
.cauldron-overlay.active {
  opacity: 1; pointer-events: all;
}
.cauldron-scene {
  position: relative; width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
}
.cauldron-body {
  position: relative;
  width: 120px; height: 120px;
  background: radial-gradient(ellipse at center, #2a2040 0%, #1a1530 60%, #0d1020 100%);
  border-radius: 60px 60px 10px 10px;
  border: 2px solid rgba(168,120,232,0.3);
  box-shadow:
    0 0 40px rgba(168,120,232,0.2),
    inset 0 0 30px rgba(168,120,232,0.1);
  overflow: hidden;
}
.cauldron-fire {
  position: absolute; bottom: 0; left: 10%; right: 10%; height: 50%;
  background: radial-gradient(ellipse at center bottom, rgba(240,140,92,0.7) 0%, rgba(168,120,232,0.4) 40%, transparent 70%);
  animation: fire-flicker 0.6s ease-in-out infinite alternate;
}
@keyframes fire-flicker {
  0% { opacity: 0.7; transform: scaleY(1); }
  100% { opacity: 1; transform: scaleY(1.15); }
}
.cauldron-smoke {
  position: absolute; top: -30px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(200,190,220,0.3);
  animation: smoke-rise 2s ease-out infinite;
}
.cauldron-smoke:nth-child(2) { left: 30%; animation-delay: 0.3s; }
.cauldron-smoke:nth-child(3) { left: 55%; animation-delay: 0.7s; width: 4px; height: 4px; }
.cauldron-smoke:nth-child(4) { left: 70%; animation-delay: 1.1s; width: 5px; height: 5px; }
@keyframes smoke-rise {
  0% { transform: translateY(0) scale(1); opacity: 0.5; }
  50% { opacity: 0.3; }
  100% { transform: translateY(-80px) scale(3); opacity: 0; }
}
.cauldron-stages {
  display: flex; gap: 8px; margin-top: 24px;
}
.stage-dot {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 2px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; color: var(--text-tertiary);
  transition: all 0.6s var(--ease-out-expo);
  position: relative;
}
.stage-dot.active {
  border-color: #a878e8;
  background: rgba(168,120,232,0.15);
  box-shadow: 0 0 15px rgba(168,120,232,0.3);
  color: #c0a0f0;
  animation: stage-pulse 1.5s ease-in-out infinite;
}
.stage-dot.done {
  border-color: #4ecb71;
  background: rgba(78,203,113,0.12);
  color: #4ecb71;
}
@keyframes stage-pulse {
  0%, 100% { box-shadow: 0 0 15px rgba(168,120,232,0.3); }
  50% { box-shadow: 0 0 30px rgba(168,120,232,0.5); }
}
.stage-connector {
  width: 24px; height: 2px;
  background: var(--border-subtle);
  align-self: center;
  transition: background 0.6s;
}
.stage-connector.done { background: rgba(78,203,113,0.4); }
.stage-labels {
  display: flex; gap: 8px; margin-top: 8px; justify-content: center;
}
.stage-label {
  width: 40px; font-size: 0.6rem; color: var(--text-tertiary); text-align: center;
  transition: color 0.6s;
}
.stage-label.active { color: #c0a0f0; }
.stage-label.done { color: #4ecb71; }
.cauldron-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px;
  letter-spacing: 0.04em;
}

/* ===== Filter Bar ===== */
.filter-bar {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 4px 0 16px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  font-size: 0.72rem; padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--border-glow); color: var(--text-primary); }
.filter-chip.active {
  background: rgba(168,120,232,0.15);
  border-color: rgba(168,120,232,0.4);
  color: #c0a0f0;
}
.filter-chip.mastery-filter {
  margin-left: auto;
  border-style: dashed;
}
.mastery-select {
  display: flex; gap: 0;
  border-radius: 20px;
  border: 1px solid var(--border-subtle);
  overflow: hidden;
  flex-shrink: 0;
  margin-left: 8px;
}
.mastery-opt {
  font-size: 0.7rem; padding: 7px 12px;
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: none; cursor: pointer;
  transition: all 0.25s;
}
.mastery-opt + .mastery-opt { border-left: 1px solid var(--border-subtle); }
.mastery-opt.active { background: rgba(168,120,232,0.2); color: #c0a0f0; }

/* ===== Crystal Grid ===== */
.crystal-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.crystal-grid-empty {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px;
  color: var(--text-tertiary);
}
.crystal-grid-empty .empty-icon {
  font-size: 3rem; margin-bottom: 12px; opacity: 0.5;
}
.crystal-grid-empty p {
  font-size: 0.85rem; line-height: 1.6;
}

/* ===== Crystal Card (Grid) ===== */
.crystal-card {
  background:
    radial-gradient(ellipse at 50% 38%, rgba(255,255,255,0.04), transparent 52%),
    linear-gradient(180deg, rgba(24,39,71,0.82), rgba(15,25,50,0.92));
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 18px 8px 13px;
  cursor: pointer;
  position: relative;
  transition: all 0.35s var(--ease-out-expo);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  overflow: hidden;
  min-height: 232px;
}
.crystal-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.35s;
  border-radius: var(--radius-lg);
  background: radial-gradient(ellipse at center top, var(--card-glow-color, transparent) 0%, transparent 70%);
  pointer-events: none;
}
.crystal-card:hover::before { opacity: 0.15; }
.crystal-card:hover {
  transform: translateY(-3px);
  border-color: var(--border-glow);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

/* --- Crystal Gem + Orbiting Text Ring --- */
.crystal-gem-wrap {
  position: relative;
  width: min(100%, 166px); height: 166px;
  display: flex; align-items: center; justify-content: center;
  isolation: isolate;
  --gem-color: #5b9cf5;
  --gem-surface: linear-gradient(160deg, #7ab8f5 0%, #3d7dd8 45%, #214b96 100%);
  --gem-glow-color: rgba(91,156,245,0.55);
}
.crystal-gem-wrap.from-asset {
  width: calc(100% + 16px);
  height: 196px;
  margin: -8px -8px 0;
  overflow: hidden;
  border-radius: 12px 12px 4px 4px;
  background: radial-gradient(ellipse at center, rgba(18,34,65,0.7), #07101e 72%);
}
.crystal-gem-wrap.from-asset::before,
.crystal-gem-wrap.from-asset::after {
  display: none;
}
.crystal-art-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  display: block;
  filter: saturate(1.06) contrast(1.03);
  transition: transform 0.45s var(--ease-out-expo);
}
.crystal-card:hover .crystal-art-img {
  transform: scale(1.025);
}
.crystal-gem-wrap::before {
  content: '';
  position: absolute;
  left: 8%; right: 8%; top: 16%; bottom: 20%;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--gem-color) 34%, transparent), transparent 62%),
    radial-gradient(circle at 50% 58%, rgba(255,255,255,0.12), transparent 34%);
  filter: blur(12px);
  opacity: 0.78;
  z-index: 0;
}
.crystal-gem-wrap::after {
  content: '';
  position: absolute;
  width: 104px; height: 20px;
  left: 50%; bottom: 24px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(ellipse, color-mix(in srgb, var(--gem-color) 60%, white 18%) 0%, color-mix(in srgb, var(--gem-color) 34%, transparent) 38%, transparent 72%);
  filter: blur(4px);
  opacity: 0.75;
  z-index: 1;
}
.crystal-text-ring-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 7;
  transform: translateY(6px) rotate(-6deg);
}
.crystal-text-ring-svg.ring-sm .ring-text { display: none; }
.crystal-text-ring-svg .ring-path {
  fill: none;
}
.crystal-text-ring-svg .ring-text {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 800;
  font-style: normal;
  fill: rgba(255,255,255,0.96);
  stroke: rgba(3,8,22,0.64);
  stroke-width: 2.2px;
  paint-order: stroke fill;
  letter-spacing: 0;
  transition: fill 0.5s;
  filter:
    drop-shadow(0 0 5px color-mix(in srgb, var(--gem-color) 80%, white 8%))
    drop-shadow(0 0 13px var(--gem-glow-color));
}
.crystal-orbit-line {
  position: absolute;
  left: 50%; top: 83px;
  width: 142px; height: 34px;
  transform: translateX(-50%) rotate(-7deg);
  border: 1px solid color-mix(in srgb, var(--gem-color) 68%, transparent);
  border-left-color: transparent;
  border-right-color: transparent;
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gem-glow-color), inset 0 0 12px color-mix(in srgb, var(--gem-color) 36%, transparent);
  opacity: 0.9;
  z-index: 5;
  pointer-events: none;
}
.crystal-phrase {
  position: absolute;
  left: 50%; top: 82px;
  width: 148px;
  transform: translateX(-50%) rotate(-7deg);
  z-index: 8;
  pointer-events: none;
  color: rgba(255,255,255,0.96);
  font-size: 12px;
  line-height: 1.08;
  font-weight: 850;
  text-align: center;
  letter-spacing: 0;
  text-wrap: balance;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.88),
    0 0 8px color-mix(in srgb, var(--gem-color) 82%, white 10%),
    0 0 16px var(--gem-glow-color);
}
.crystal-gem {
  position: relative;
  z-index: 4;
  width: 66px; height: 112px;
  transition: all 0.5s var(--ease-spring);
  transform: translateY(-10px);
  filter: drop-shadow(0 16px 16px rgba(0,0,0,0.35));
}
.crystal-gem .gem-body {
  position: absolute; inset: 0;
  clip-path: polygon(50% 0%, 76% 12%, 94% 38%, 84% 83%, 50% 100%, 16% 83%, 6% 38%, 24% 12%);
  background:
    linear-gradient(92deg, rgba(255,255,255,0.38) 0 8%, transparent 9% 22%, rgba(255,255,255,0.18) 23% 36%, transparent 37% 54%, rgba(0,0,0,0.22) 55% 72%, rgba(255,255,255,0.16) 73% 82%, rgba(0,0,0,0.28) 83% 100%),
    radial-gradient(circle at 50% 78%, color-mix(in srgb, var(--gem-color) 80%, white 14%) 0%, transparent 34%),
    var(--gem-surface);
  transition: all 0.5s var(--ease-out-expo);
  box-shadow: inset 0 0 18px rgba(255,255,255,0.22);
}
.crystal-gem .gem-body::before,
.crystal-gem .gem-body::before {
  content: '';
  position: absolute; inset: 0;
  clip-path: polygon(50% 0%, 67% 14%, 55% 100%, 43% 100%, 33% 14%);
  background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.05) 42%, rgba(0,0,0,0.16));
  mix-blend-mode: screen;
}
.crystal-gem .gem-body::after {
  clip-path: polygon(24% 12%, 50% 0%, 43% 100%, 16% 83%, 6% 38%);
  background: linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0.03) 42%, rgba(0,0,0,0.18));
}
.crystal-gem .gem-highlight {
  position: absolute;
  top: 11%; left: 24%; width: 26%; height: 28%;
  clip-path: polygon(50% 0%, 100% 24%, 78% 100%, 14% 76%);
  background: rgba(255,255,255,0.34);
  filter: blur(0.2px);
  transition: all 0.5s;
}
.crystal-gem .gem-shadow {
  position: absolute;
  bottom: 12%; right: 8%; width: 34%; height: 30%;
  clip-path: polygon(18% 0%, 100% 14%, 72% 100%, 0% 82%);
  background: rgba(0,0,0,0.28);
  transition: all 0.5s;
}
.crystal-gem .gem-inner-fire {
  position: absolute;
  top: 30%; left: 18%; width: 64%; height: 58%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.65) 0%, color-mix(in srgb, var(--gem-color) 68%, transparent) 34%, transparent 72%);
  filter: blur(5px);
  transition: opacity 0.5s;
}
.crystal-shards {
  position: absolute;
  left: 50%; bottom: 37px;
  width: 112px; height: 38px;
  transform: translateX(-50%);
  z-index: 3;
  pointer-events: none;
}
.crystal-shards span {
  position: absolute;
  bottom: 0;
  width: 18px; height: 36px;
  clip-path: polygon(50% 0%, 100% 34%, 82% 100%, 16% 100%, 0 36%);
  background: var(--gem-surface);
  filter: brightness(1.08) drop-shadow(0 0 8px var(--gem-glow-color));
  opacity: 0.78;
}
.crystal-shards span:nth-child(1) { left: 14px; height: 27px; transform: rotate(-28deg); opacity: 0.62; }
.crystal-shards span:nth-child(2) { left: 30px; height: 36px; transform: rotate(-12deg); }
.crystal-shards span:nth-child(3) { right: 30px; height: 34px; transform: rotate(14deg); }
.crystal-shards span:nth-child(4) { right: 13px; height: 25px; transform: rotate(28deg); opacity: 0.58; }
.crystal-pedestal {
  position: absolute;
  left: 50%; bottom: 18px;
  width: 104px; height: 30px;
  transform: translateX(-50%);
  border-radius: 50%;
  z-index: 2;
  background:
    radial-gradient(ellipse at 50% 24%, rgba(255,255,255,0.18), transparent 32%),
    linear-gradient(180deg, rgba(42,52,77,0.95), rgba(10,16,30,0.98));
  border: 1px solid rgba(255,255,255,0.16);
  box-shadow: 0 0 18px var(--gem-glow-color), inset 0 2px 4px rgba(255,255,255,0.12), inset 0 -8px 14px rgba(0,0,0,0.45);
}
.crystal-pedestal::before,
.crystal-pedestal::after {
  content: '';
  position: absolute;
  left: 9px; right: 9px;
  border-radius: 50%;
  border: 1px solid color-mix(in srgb, var(--gem-color) 54%, rgba(255,255,255,0.18));
}
.crystal-pedestal::before { top: 5px; height: 14px; }
.crystal-pedestal::after { top: 10px; height: 9px; opacity: 0.7; }
.crystal-pedestal span {
  position: absolute;
  left: 50%; top: 7px;
  width: 54px; height: 10px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(ellipse, color-mix(in srgb, var(--gem-color) 75%, white 18%), transparent 70%);
  filter: blur(3px);
}

/* Mastery: unlearned — dull */
.crystal-gem[data-mastery="unlearned"] .gem-body {
  filter: brightness(0.48) saturate(0.45) blur(0.15px);
}
.crystal-gem[data-mastery="unlearned"] .gem-inner-fire { opacity: 0; }
.crystal-gem[data-mastery="unlearned"] .gem-highlight { opacity: 0.3; }

/* Mastery: practiced — subtle glow */
.crystal-gem[data-mastery="practiced"] .gem-body {
  filter: brightness(0.75) saturate(0.8);
}
.crystal-gem[data-mastery="practiced"] .gem-inner-fire { opacity: 0.5; }
.crystal-gem[data-mastery="practiced"] .gem-highlight { opacity: 0.6; }

/* Mastery: mastered — bright luminous */
.crystal-gem[data-mastery="mastered"] .gem-body {
  filter: brightness(1.18) saturate(1.28);
}
.crystal-gem[data-mastery="mastered"] .gem-inner-fire { opacity: 1; }
.crystal-gem[data-mastery="mastered"] .gem-highlight { opacity: 0.9; }

/* Crystal glow ring */
.crystal-glow {
  position: absolute; inset: 22px 16px 32px;
  border-radius: 50%;
  background: transparent;
  transition: all 0.5s var(--ease-out-expo);
  pointer-events: none;
  z-index: 0;
}
.crystal-gem[data-mastery="unlearned"] ~ .crystal-glow {
  box-shadow: none;
}
.crystal-gem[data-mastery="practiced"] ~ .crystal-glow {
  box-shadow: 0 0 22px var(--gem-glow-color, transparent), 0 0 44px var(--gem-glow-color, transparent);
  animation: glow-soft 2.5s ease-in-out infinite;
}
.crystal-gem[data-mastery="mastered"] ~ .crystal-glow {
  box-shadow: 0 0 32px var(--gem-glow-color, transparent), 0 0 68px var(--gem-glow-color, transparent), 0 0 104px var(--gem-glow-color, transparent);
  animation: glow-strong 2s ease-in-out infinite;
}
@keyframes glow-soft {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes glow-strong {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; transform: scale(1.05); }
}

/* Sparkle particles for mastered */
.sparkle {
  position: absolute; width: 3px; height: 3px;
  background: #fff; border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  animation: sparkle-fly 2s ease-out infinite;
  z-index: 8;
  box-shadow: 0 0 8px #fff, 0 0 14px var(--gem-glow-color);
}
.crystal-gem[data-mastery="mastered"] .sparkle { opacity: 1; }
.sparkle:nth-child(1) { top: -4px; left: 30%; animation-delay: 0s; }
.sparkle:nth-child(2) { top: 10px; right: -2px; animation-delay: 0.6s; }
.sparkle:nth-child(3) { bottom: 5px; left: 10%; animation-delay: 1.2s; }
@keyframes sparkle-fly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--sx, 8px), var(--sy, -12px)) scale(0); opacity: 0; }
}

/* Crystal card info */
.crystal-card-info {
  text-align: center; width: 100%;
}
.crystal-name {
  font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
  margin-bottom: 3px; line-height: 1.3;
}
.crystal-scene {
  min-height: 30px;
  margin-bottom: 6px;
  color: var(--text-primary);
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 1.3;

  align-items: center;
  justify-content: center;
  gap: 6px;
}
.crystal-meta {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
}
.crystal-tag {
  font-size: 0.62rem; padding: 2px 8px;

  background: var(--bg-elevated);
  color: var(--text-tertiary);
}
.crystal-difficulty {
  font-size: 0.62rem;
  display: flex; align-items: center; gap: 3px;
}
.diff-dot { width: 5px; height: 5px; border-radius: 50%; }
.diff-dot.easy { background: #4ecb71; }
.diff-dot.medium { background: #e2b04a; }
.diff-dot.hard { background: #f0729e; }

/* Reuse stars */
.reuse-stars {
  display: flex; gap: 1px; justify-content: center; margin-top: 2px;
}
.reuse-star {
  font-size: 0.6rem; color: var(--text-tertiary);
  transition: color 0.3s;
}
.reuse-star.filled { color: #e2b04a; }

/* Mastery badge */
.mastery-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 0.6rem; padding: 2px 8px; border-radius: 8px;
  font-weight: 500; letter-spacing: 0.03em;
}
.mastery-badge.unlearned { background: rgba(255,255,255,0.06); color: var(--text-tertiary); }
.mastery-badge.practiced { background: rgba(168,120,232,0.2); color: #b895e8; }
.mastery-badge.mastered { background: rgba(78,203,113,0.2); color: #5fd97e; }

/* ===== Crystal Detail Panel ===== */
.detail-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s;
}
.detail-overlay.open { opacity: 1; pointer-events: all; }
.detail-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;

  max-height: 88vh;

  transform: translateY(100%);
  transition: transform 0.45s var(--ease-out-expo);

}

/* Detail crystal hero — large crystal with full orbiting text ring */
.detail-crystal-hero {

}

}

  object-fit: contain;
}

}

/* Keep old row layout as fallback */
.detail-crystal-row {

}
.detail-gem-wrap {

  position: relative;

}

  width: 80px; height: 104px;
}
.detail-gem-wrap .crystal-glow {
  inset: -14px;
}
.detail-title-area { flex: 1; }
.detail-crystal-name {
  font-family: 'Cormorant Garamond', serif;

}
.detail-english {

}

/* Detail info blocks */
.detail-block {
  background: var(--bg-surface);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border-subtle);
}
.detail-block-label {
  font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase;

}

/* ===== Chunk Practice ===== */
.chunk-section {
  margin-top: 16px;
}
.chunk-section.completed {
  display: none;
}
.chunk-section-title {
  font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.chunk-section-title .icon { font-size: 1.1rem; }
.chunk-hint {
  font-size: 0.72rem; color: var(--text-tertiary); margin-bottom: 10px;
}
.chunk-target {
  background: var(--bg-elevated);
  border: 1px dashed var(--border-glow);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  min-height: 44px;
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center;
  margin-bottom: 12px;
  transition: all 0.3s;
}
.chunk-target.correct {
  border-color: #4ecb71;

  box-shadow: 0 0 20px rgba(78,203,113,0.15);
}
.chunk-target.wrong {
  border-color: #f0729e;
  background: rgba(240,114,158,0.08);
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-3px); }
}
.chunk-placed {
  font-size: 0.8rem; padding: 6px 10px;
  background: var(--gem-color, var(--bg-elevated));
  border-radius: 6px; color: #fff; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.chunk-placed:hover { opacity: 0.8; }
.chunk-options {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.chunk-option {
  font-size: 0.8rem; padding: 8px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 8px; color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s var(--ease-out-expo);
  font-weight: 500;
}
.chunk-option:hover {
  background: var(--bg-elevated);
  border-color: rgba(168,120,232,0.5);
  transform: translateY(-1px);
}
.chunk-option.used {
  opacity: 0.3; pointer-events: none; border-style: dashed;
}
.chunk-result {
  margin-top: 12px; padding: 12px 16px;
  border-radius: var(--radius-md);
  font-size: 0.82rem; text-align: center;
  font-weight: 500;
  display: none;
}
.chunk-result.show { display: block; }
.chunk-result.success {
  background: rgba(78,203,113,0.1); color: #5fd97e;
}
.chunk-result.error {
  background: rgba(240,114,158,0.1); color: #f090a0;

.production-section {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);

.production-section.locked {
  opacity: 0.55;

.diagnosis-card {

}
.diagnosis-title {

}

/* ===== Mastery Advance Button ===== */
.btn-advance {
  width: 100%; padding: 12px; border-radius: var(--radius-md);

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
  z-index: 300; padding: 10px 20px;
  border-radius: 20px;

}

  .app-shell { padding: 24px 20px 120px; }
  .crystal-grid { gap: 16px; }
}

function shortenPhrase(text, maxLength) {
  if (text.length <= maxLength) return text;
  const cutAt = text.lastIndexOf(' ', maxLength - 3);
  return text.slice(0, cutAt > 18 ? cutAt : maxLength - 3).trim() + '...';
}

function getSceneExcerpt(text, maxLength = 34) {
  const firstSentence = text.split(/[；。]/)[0].trim();
  return firstSentence.length > maxLength ? firstSentence.slice(0, maxLength - 1) + '…' : firstSentence;
}

function crystalStyleVars(topicStyle) {

}

function createCrystalTextRing(c, size) {
  const topicStyle = topicColorMap[c.topic_tag] || topicColorMap['学习'];
  const sentence = shortenPhrase(c.english_sentence, size === 'lg' ? 92 : 32);

  // Size presets: viewBox and ring geometry
  const presets = {
    sm: { viewBox: 180, rX: 78, rY: 22, fontSize: 13, centerX: 90, centerY: 102 },
    lg: { viewBox: 240, r: 100, fontSize: 11, centerX: 120, centerY: 120 }
  };
  const p = presets[size] || presets.sm;

  // For grid (sm): half-circle arc below — reads naturally left to right
  // For detail (lg): full-circle ring around the entire crystal
  let pathD;
  if (size === 'lg') {
    // Full circle (almost-closed arc)
    pathD = `M ${p.centerX},${p.centerY - p.r} A ${p.r},${p.r} 0 1,1 ${p.centerX - 0.1},${p.centerY - p.r}`;
  } else {
    // Front orbit arc, matching the luminous phrase band in the reference image.
    const startX = p.centerX - p.rX;
    const endX = p.centerX + p.rX;
    pathD = `M ${startX},${p.centerY} A ${p.rX},${p.rY} 0 0,1 ${endX},${p.centerY}`;
  }

  const pathId = `ring-path-${size}-${c.id}`;
  const startOffset = size === 'lg' ? '50%' : '50%';

  return `
    <svg class="crystal-text-ring-svg ring-${size}" viewBox="0 0 ${p.viewBox} ${p.viewBox}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="${pathId}" d="${pathD}" />
      </defs>
      <text class="ring-text" font-size="${p.fontSize}">
        <textPath href="#${pathId}" startOffset="${startOffset}" text-anchor="middle">
          ${escapeHTML(sentence)}
        </textPath>
      </text>
    </svg>`;
}

  }

  list.innerHTML = recent.map(c => {
    const topicStyle = topicColorMap[c.topic_tag] || topicColorMap['学习'];

        <div class="recent-gem-row">

        <div class="recent-item-name">${c.crystal_name}</div>
        <div class="recent-item-time">${timeStr}</div>
      </div>`;
  }).join('');
}

function formatRelativeTime(date) {
  const now = new Date();
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return '刚刚';
  if (diffMin < 60) return `${diffMin} 分钟前`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr} 小时前`;
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay === 1) return '昨天';
  if (diffDay < 7) return `${diffDay} 天前`;
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

      ${chunkPracticeState.placed.length === c.chunks.length ? `
        <button class="btn-advance to-practiced" id="btnCheckChunks" style="margin-top:12px;">✨ 提交检查</button>
      ` : ''}
    </div>

    ${createProductionPracticeHTML(c)}

    ${createMasteryActionHTML(c)}
  `;

  document.getElementById('detailContent').innerHTML = detailHTML;
  attachChunkEvents();
  attachProductionEvents();
  const btnCheck = document.getElementById('btnCheckChunks');
  if (btnCheck) btnCheck.addEventListener('click', checkChunks);
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('open');
  selectedCrystalId = null;
  chunkPracticeState = {};
  setTimeout(() => {
    renderCrystalGrid();
    renderRecentList();
    updateStats();
  }, 400);
}

// ===== CHUNK PRACTICE (index-based, event delegation) =====

function refreshChunkUI() {
  const c = crystals.find(x => x.id === selectedCrystalId);
  if (!c) return;

  const topicStyle = topicColorMap[c.topic_tag] || topicColorMap['学习'];
  const target = document.getElementById('chunkTarget');
  const options = document.getElementById('chunkOptions');
  const result = document.getElementById('chunkResult');

  if (target) {
    if (chunkPracticeState.placed.length === 0) {
      target.innerHTML = '<span style="color:var(--text-tertiary);font-size:0.78rem;">点击下方语块按顺序排列…</span>';
      target.className = 'chunk-target';
    } else {
      target.innerHTML = chunkPracticeState.placed.map((ch, i) =>
        `<span class="chunk-placed" data-chunk-idx="${i}" style="--gem-color:${topicStyle.color};background:${topicStyle.color};">${escapeHTML(ch)}</span>`
      ).join('');
    }
  }

  if (options) {
    options.innerHTML = chunkPracticeState.remaining.map((ch, i) =>
      `<span class="chunk-option" data-chunk-idx="${i}">${escapeHTML(ch)}</span>`
    ).join('');

    const existingSubmit = document.getElementById('btnCheckChunks');
    if (existingSubmit) existingSubmit.remove();

    if (chunkPracticeState.placed.length === c.chunks.length && chunkPracticeState.correct === null) {
      const submitBtn = document.createElement('button');
      submitBtn.className = 'btn-advance to-practiced';
      submitBtn.id = 'btnCheckChunks';
      submitBtn.textContent = '✨ 提交检查';
      submitBtn.style.marginTop = '12px';
      options.parentElement.appendChild(submitBtn);
      document.getElementById('btnCheckChunks').addEventListener('click', checkChunks);
    }
  }

  if (result) {
    result.className = 'chunk-result';
    result.textContent = '';
  }

  // Attach event delegation
  attachChunkEvents();
}

function renderProductionPractice() {
  const c = crystals.find(x => x.id === selectedCrystalId);
  if (!c) return;

  const section = document.getElementById('productionSection');
  if (section) {
    section.outerHTML = createProductionPracticeHTML(c);
    attachProductionEvents();
  }

  const existingMasteryAction = document.querySelector('.detail-content > .btn-advance:last-child');
  if (existingMasteryAction) {
    existingMasteryAction.outerHTML = createMasteryActionHTML(c);
  }
}

function attachChunkEvents() {
  const target = document.getElementById('chunkTarget');
  const options = document.getElementById('chunkOptions');

  if (target) {
    target.querySelectorAll('.chunk-placed').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.chunkIdx);
        if (!isNaN(idx) && idx < chunkPracticeState.placed.length) {
          removeChunkByIndex(idx);
        }
      });
    });
  }

  if (options) {
    options.querySelectorAll('.chunk-option').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.chunkIdx);
        if (!isNaN(idx) && idx < chunkPracticeState.remaining.length) {
          placeChunkByIndex(idx);
        }
      });
    });
  }
}

function attachProductionEvents() {
  const input = document.getElementById('productionInput');
  const btnCheck = document.getElementById('btnCheckProduction');
  const btnVoice = document.getElementById('btnVoiceInput');

  if (input) {
    input.addEventListener('input', () => {
      chunkPracticeState.productionAnswer = input.value;
      chunkPracticeState.productionDiagnosis = null;
    });
  }
  if (btnCheck) btnCheck.addEventListener('click', checkProductionSentence);
  if (btnVoice) btnVoice.addEventListener('click', startVoiceInput);
}

function placeChunkByIndex(idx) {
  if (chunkPracticeState.correct !== null) return;
  const chunk = chunkPracticeState.remaining[idx];
  chunkPracticeState.remaining.splice(idx, 1);
  chunkPracticeState.placed.push(chunk);
  refreshChunkUI();
}

function removeChunkByIndex(idx) {
  if (chunkPracticeState.correct !== null) return;
  const chunk = chunkPracticeState.placed[idx];
  chunkPracticeState.placed.splice(idx, 1);
  chunkPracticeState.remaining.push(chunk);
  refreshChunkUI();
}

function checkChunks() {
  const c = crystals.find(x => x.id === selectedCrystalId);
  if (!c) return;

  const target = document.getElementById('chunkTarget');
  const result = document.getElementById('chunkResult');
  const isCorrect = arraysEqual(chunkPracticeState.placed, c.chunks);

  chunkPracticeState.correct = isCorrect;

  if (isCorrect) {
    target.className = 'chunk-target correct';
    result.className = 'chunk-result success show';
    result.textContent = '✅ 完全正确！语块顺序和原句一致，已解锁整句输出练习。';
    const btnCheck = document.getElementById('btnCheckChunks');
    if (btnCheck) btnCheck.remove();
    chunkPracticeState.productionUnlocked = true;
    const chunkSection = document.getElementById('chunkSection');
    if (chunkSection) chunkSection.classList.add('completed');
    renderProductionPractice();
    const productionSection = document.getElementById('productionSection');
    if (productionSection) productionSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    target.className = 'chunk-target wrong';
    result.className = 'chunk-result error show';
    result.textContent = `❌ 还不太对。正确顺序：${c.chunks.join(' → ')}`;

    // Reset after showing error
    setTimeout(() => {
      chunkPracticeState.correct = null;
      chunkPracticeState.placed = [];
      chunkPracticeState.remaining = shuffleArray([...c.chunks]);
      refreshChunkUI();
      if (target) target.className = 'chunk-target';
    }, 2000);
  }
}

function checkProductionSentence() {
  const c = crystals.find(x => x.id === selectedCrystalId);
  const input = document.getElementById('productionInput');
  if (!c || !input) return;

  chunkPracticeState.productionAnswer = input.value.trim();
  chunkPracticeState.productionDiagnosis = diagnoseProductionAnswer(chunkPracticeState.productionAnswer, c);
  renderProductionPractice();
  showToast(chunkPracticeState.productionDiagnosis.passed ? 'AI 诊断通过，可以推进状态' : 'AI 诊断完成，先按建议修改');
}

function startVoiceInput() {
  const input = document.getElementById('productionInput');
  const btn = document.getElementById('btnVoiceInput');
  if (!input) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('当前浏览器不支持语音输入，请手动输入');
    return;
  }

  if (speechRecognition) {
    speechRecognition.stop();
    speechRecognition = null;
    if (btn) btn.classList.remove('recording');
    return;
  }

  speechRecognition = new SpeechRecognition();
  speechRecognition.lang = 'en-US';
  speechRecognition.interimResults = false;
  speechRecognition.maxAlternatives = 1;
  if (btn) btn.classList.add('recording');
  showToast('正在听你说英文…');

  speechRecognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    input.value = transcript;
    chunkPracticeState.productionAnswer = transcript;
    chunkPracticeState.productionDiagnosis = null;
  };
  speechRecognition.onerror = () => showToast('语音识别失败，请再试一次或手动输入');
  speechRecognition.onend = () => {
    speechRecognition = null;
    const currentBtn = document.getElementById('btnVoiceInput');
    if (currentBtn) currentBtn.classList.remove('recording');
  };
  speechRecognition.start();
}

function diagnoseProductionAnswer(answer, c) {
  const trimmed = answer.trim();
  if (!trimmed) {
    return {
      passed: false,
      score: 0,
      messages: ['还没有输入英文句子。请看中文释义，尝试完整写出这句话。']
    };
  }

  const normalizedAnswer = normalizeSentence(trimmed);
  const normalizedTarget = normalizeSentence(c.english_sentence);
  const similarity = sentenceSimilarity(normalizedAnswer, normalizedTarget);
  const missingChunks = c.chunks.filter(chunk => !normalizedAnswer.includes(normalizeSentence(chunk)));
  const messages = [];
  const hasChinese = /[\u4e00-\u9fff]/.test(trimmed);

  if (similarity >= 0.94) {
    messages.push('句子结构和目标表达高度一致，可以直接用于真实表达。');
  } else if (similarity >= 0.78) {
    messages.push('核心意思基本到位，但个别语块、顺序或小词还可以更贴近原句。');
  } else {
    messages.push('当前句子和目标表达差距较大，建议先对照语块再重写一遍。');
  }

  if (missingChunks.length > 0) {
    messages.push(`建议补上或调整这些关键语块：${missingChunks.slice(0, 3).join(' / ')}${missingChunks.length > 3 ? '…' : ''}`);
  }
  if (hasChinese) {
    messages.push('输入中还有中文，请改成完整英文句子。');
  }
  if (!/[.!?]$/.test(trimmed)) {
    messages.push('句末可以补上英文标点，让表达更完整。');
  }
  if (/^i\b/.test(trimmed) || /^[a-z]/.test(trimmed)) {
    messages.push('注意句首大写，尤其是 I 要大写。');
  }

  messages.push(`参考答案：${c.english_sentence}`);

  return {
    passed: similarity >= 0.72 && missingChunks.length <= 2 && !hasChinese,
    score: similarity,
    messages
  };
}

function normalizeSentence(text) {
  return text
    .toLowerCase()
    .replace(/[’‘]/g, "'")
    .replace(/[^a-z0-9' ]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function sentenceSimilarity(a, b) {
  if (!a || !b) return 0;
  const distance = levenshteinDistance(a, b);
  return Math.max(0, 1 - distance / Math.max(a.length, b.length));
}

function levenshteinDistance(a, b) {
  const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return dp[a.length][b.length];
}

// ===== MASTERY ADVANCE =====
function advanceMastery(id, newMastery) {
  const c = crystals.find(x => x.id === id);
  if (!c) return;

  c.mastery = newMastery;
  c.practiced_at = new Date().toISOString();

  // Re-render detail
  openDetail(id);

  // Show toast
  const messages = {
    practiced: '🔮 晶体已点亮！继续练习把它变成你的表达',
    mastered: '💎 恭喜！这颗晶体已完全属于你，去花园看看吧 🌸'
  };
  showToast(messages[newMastery] || '状态已更新');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== CAULDRON ANIMATION =====
function startCauldron(callback) {
  const overlay = document.getElementById('cauldronOverlay');
  const stages = document.querySelectorAll('.stage-dot');
  const connectors = document.querySelectorAll('.stage-connector');
  const labels = document.querySelectorAll('.stage-label');

  overlay.classList.add('active');

  // Reset
  stages.forEach(s => { s.classList.remove('active', 'done'); });
  connectors.forEach(c => { c.classList.remove('done'); });
  labels.forEach(l => { l.classList.remove('active', 'done'); });

  const stageNames = ['extract', 'filter', 'chunk', 'crystallize'];
  const stageDelay = [800, 2000, 3400, 4800];

  stageNames.forEach((_, i) => {
    setTimeout(() => {
      // Mark previous as done
      if (i > 0) {
        stages[i - 1].classList.remove('active');
        stages[i - 1].classList.add('done');
        if (connectors[i - 1]) connectors[i - 1].classList.add('done');
        if (labels[i - 1]) { labels[i - 1].classList.remove('active'); labels[i - 1].classList.add('done'); }
      }
      // Activate current
      stages[i].classList.add('active');
      if (labels[i]) labels[i].classList.add('active');
    }, stageDelay[i]);
  });

  // Complete
  setTimeout(() => {
    stages[3].classList.remove('active');
    stages[3].classList.add('done');
    if (labels[3]) { labels[3].classList.remove('active'); labels[3].classList.add('done'); }

    setTimeout(() => {
      overlay.classList.remove('active');
      // Reset all
      stages.forEach(s => { s.classList.remove('active', 'done'); });
      connectors.forEach(c => { c.classList.remove('done'); });
      labels.forEach(l => { l.classList.remove('active', 'done'); });
      if (callback) callback();
    }, 600);
  }, 5600);
}

// ===== EVENT BINDING =====
function bindEvents() {
  // Refine button
  document.getElementById('btnRefine').addEventListener('click', handleRefine);

  // Topic filter chips
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeTopic = chip.dataset.topic;
      renderCrystalGrid();
    });
  });

  // Mastery filter
  document.querySelectorAll('.mastery-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.mastery-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      activeMasteryFilter = opt.dataset.masteryFilter;
      renderCrystalGrid();
    });
  });

  // Detail overlay close
  document.getElementById('detailOverlay').addEventListener('click', closeDetail);

  // Swipe down on detail panel handle
  document.getElementById('detailPanel').addEventListener('click', (e) => {
    if (e.target.closest('.detail-handle')) {
      closeDetail();
    }
  });

  // Keyboard shortcut for closing detail
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && selectedCrystalId !== null) {
      closeDetail();
    }
  });
}

// ===== UTILS =====
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
